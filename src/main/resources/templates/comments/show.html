<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${title}">Dettaglio commento</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container py-5">

        <h1 class="mb-4">Dettaglio commento</h1>

        <div class="card">

            <div class="card-body">

                <h2 class="card-title" th:text="${comment.username}">
                </h2>

                <p>
                    <strong>Post:</strong>
                    <span th:text="${comment.postTitle}"></span>
                </p>

                <p class="card-text" th:text="${comment.body}">
                </p>

                <a th:href="@{/comments/{id}/edit(id=${comment.id})}" class="btn btn-warning">
                    Modifica
                </a>

                <a th:href="@{/comments}" class="btn btn-secondary">
                    Torna ai commenti
                </a>

                <a th:href="@{/posts}" class="btn btn-outline-success">
                    Vai ai post
                </a>

                <a th:href="@{/}" class="btn btn-outline-secondary">
                    Home
                </a>

            </div>

        </div>

    </div>

</body>

</html>
