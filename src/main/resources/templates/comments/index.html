<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${title}">Commenti</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Commenti</h1>

            <div class="mb-4 d-flex gap-2 flex-wrap">

                <a th:href="@{/authors}" class="btn btn-outline-primary">
                    Autori
                </a>

                <a th:href="@{/posts}" class="btn btn-outline-success">
                    Post
                </a>

            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/}" class="btn btn-outline-secondary">
                    Torna alla home
                </a>

                <a th:href="@{/comments/create}" class="btn btn-primary">
                    Nuovo commento
                </a>

                <form th:action="@{/logout}" method="post" class="d-inline">

                    <button type="submit" class="btn btn-danger">
                        Logout
                    </button>
                </form>
            </div>
        </div>

        <table class="table table-striped table-bordered align-middle">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Contenuto</th>
                    <th>Post</th>
                    <th>Azioni</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="comment : ${comments}">
                    <td th:text="${comment.id}"></td>
                    <td th:text="${comment.username}"></td>
                    <td th:text="${comment.body}"></td>
                    <td th:text="${comment.postTitle}"></td>

                    <td>
                        <a th:href="@{/comments/{id}(id=${comment.id})}" class="btn btn-info btn-sm">
                            Dettagli
                        </a>

                        <a th:href="@{/comments/{id}/edit(id=${comment.id})}" class="btn btn-warning btn-sm">
                            Modifica
                        </a>

                        <form th:action="@{/comments/{id}/delete(id=${comment.id})}" method="post" class="d-inline">

                            <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('Eliminare questo commento?')">
                                Elimina
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>

        </table>

        <a th:href="@{/posts}" class="btn btn-secondary">
            Vai ai post
        </a>

    </div>

</body>

</html>
