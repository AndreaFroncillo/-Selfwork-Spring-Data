<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${title}">Post</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Post</h1>

            <div class="mb-4 d-flex gap-2 flex-wrap">

                <a th:href="@{/authors}" class="btn btn-outline-primary">
                    Autori
                </a>

                <a th:href="@{/comments}" class="btn btn-outline-warning">
                    Commenti
                </a>

            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/}" class="btn btn-outline-secondary">
                    Torna alla home
                </a>

                <a th:href="@{/posts/create}" class="btn btn-primary">
                    Nuovo post
                </a>
            </div>
        </div>

        <table class="table table-striped table-bordered align-middle">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Titolo</th>
                    <th>Autore</th>
                    <th>Commenti</th>
                    <th>Azioni</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="post : ${posts}">
                    <td th:text="${post.id}"></td>
                    <td th:text="${post.title}"></td>
                    <td th:text="${post.authorFullname}"></td>
                    <td th:text="${post.numberOfComments}"></td>

                    <td>
                        <a th:href="@{/posts/{id}(id=${post.id})}" class="btn btn-info btn-sm">
                            Dettagli
                        </a>

                        <a th:href="@{/posts/{id}/edit(id=${post.id})}" class="btn btn-warning btn-sm">
                            Modifica
                        </a>

                        <form th:action="@{/posts/{id}/delete(id=${post.id})}" method="post" class="d-inline">

                            <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('Eliminare questo post?')">
                                Elimina
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>

        </table>

        <a th:href="@{/authors}" class="btn btn-secondary">
            Vai agli autori
        </a>

    </div>

</body>

</html>
