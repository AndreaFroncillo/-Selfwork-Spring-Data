<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${title}">Nuovo post</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container py-5">

        <h1 class="mb-4">Nuovo post</h1>

        <form th:action="@{/posts}" th:object="${post}" method="post">

            <div class="mb-3">
                <label for="title" class="form-label">
                    Titolo
                </label>

                <input id="title" type="text" class="form-control" th:field="*{title}" required>
            </div>

            <div class="mb-3">
                <label for="body" class="form-label">
                    Contenuto
                </label>

                <textarea id="body" class="form-control" th:field="*{body}" rows="6" required>
            </textarea>
            </div>

            <div class="mb-3">
                <label for="authorId" class="form-label">
                    Autore
                </label>

                <select id="authorId" class="form-select" th:field="*{authorId}" required>

                    <option value="">
                        Seleziona un autore
                    </option>

                    <option th:each="author : ${authors}" th:value="${author.id}" th:text="${author.fullname}">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">
                Salva
            </button>

            <a th:href="@{/posts}" class="btn btn-secondary">
                Torna ai post
            </a>

            <a th:href="@{/authors}" class="btn btn-outline-primary">
                Vai agli autori
            </a>

            <a th:href="@{/}" class="btn btn-outline-secondary">
                Home
            </a>

        </form>

    </div>

</body>

</html>
