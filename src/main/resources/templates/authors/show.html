<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${title}">Dettaglio autore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container py-5">

        <h1 class="mb-4">Dettaglio autore</h1>

        <div class="card">

            <div class="card-body">

                <h2 class="card-title" th:text="${author.fullname}">
                </h2>

                <p class="card-text">
                    <strong>ID:</strong>
                    <span th:text="${author.id}"></span>
                </p>

                <p class="card-text">
                    <strong>Email:</strong>
                    <span th:text="${author.email}"></span>
                </p>

                <p class="card-text">
                    <strong>Numero post:</strong>
                    <span th:text="${author.numberOfPosts}"></span>
                </p>

                <a th:href="@{/authors/{id}/edit(id=${author.id})}" class="btn btn-warning">
                    Modifica
                </a>

                <a th:href="@{/authors}" class="btn btn-secondary">
                    Torna agli autori
                </a>

                <a th:href="@{/posts}" class="btn btn-outline-success">
                    Vai ai post
                </a>

                <a th:href="@{/}" class="btn btn-outline-secondary">
                    Home
                </a>

            </div>

        </div>

    </div>

</body>

</html>
