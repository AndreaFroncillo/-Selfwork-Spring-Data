<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${title}">Autori</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Autori</h1>

            <div class="mb-4 d-flex gap-2 flex-wrap">

                <a th:href="@{/posts}" class="btn btn-outline-success">
                    Post
                </a>

                <a th:href="@{/comments}" class="btn btn-outline-warning">
                    Commenti
                </a>

            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/}" class="btn btn-outline-secondary">
                    Torna alla home
                </a>

                <a th:href="@{/authors/create}" class="btn btn-primary">
                    Nuovo autore
                </a>
            </div>
        </div>

        <table class="table table-striped table-bordered align-middle">

            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome completo</th>
                    <th>Email</th>
                    <th>Numero post</th>
                    <th>Azioni</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="author : ${authors}">
                    <td th:text="${author.id}"></td>

                    <td th:text="${author.fullname}"></td>

                    <td th:text="${author.email}"></td>

                    <td th:text="${author.numberOfPosts}"></td>

                    <td>
                        <a th:href="@{/authors/{id}(id=${author.id})}" class="btn btn-info btn-sm">
                            Dettagli
                        </a>

                        <a th:href="@{/authors/{id}/edit(id=${author.id})}" class="btn btn-warning btn-sm">
                            Modifica
                        </a>

                        <form th:action="@{/authors/{id}/delete(id=${author.id})}" method="post" class="d-inline">

                            <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('Eliminare questo autore?')">
                                Elimina
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>

        </table>

    </div>

</body>

</html>
