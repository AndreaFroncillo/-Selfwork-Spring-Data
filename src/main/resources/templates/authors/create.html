<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title th:text="${title}">Nuovo autore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container py-5">

        <h1 class="mb-4">Nuovo autore</h1>

        <form th:action="@{/authors}" th:object="${author}" method="post">

            <div class="mb-3">
                <label for="name" class="form-label">
                    Nome
                </label>

                <input id="name" type="text" class="form-control" th:field="*{name}" required>
            </div>

            <div class="mb-3">
                <label for="surname" class="form-label">
                    Cognome
                </label>

                <input id="surname" type="text" class="form-control" th:field="*{surname}" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">
                    Email
                </label>

                <input id="email" type="email" class="form-control" th:field="*{email}" required>
            </div>

            <button type="submit" class="btn btn-primary">
                Salva
            </button>

            <a th:href="@{/authors}" class="btn btn-secondary">
                Torna agli autori
            </a>

            <a th:href="@{/}" class="btn btn-outline-secondary">
                Home
            </a>

        </form>

    </div>

</body>

</html>
